<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API 控制台</title>
  <style>
    body{background:#1e1e2e;color:#fff;font-family:Arial;padding:20px}
    .card{background:#2d2d44;padding:24px;border-radius:12px;margin-bottom:20px}
    .label{color:#aaa;font-size:14px}
    .value{font-size:20px;font-weight:bold;color:#72dfff}
    .key{color:#9cef87;font-family:monospace}
    .api{color:#ffd17d;font-family:monospace}
    .title{font-size:22px;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">个人 API 控制台</div>
    <div class="label">你的 API 地址</div>
    <div class="value api">https://mitsuki97.github.io/LLM-api/v1/chat/completions</div>
  </div>

  <div class="card">
    <div class="label">你的专属 KEY</div>
    <div class="value key" id="user_key">sk_loading...</div>
  </div>

  <div class="card">
    <div class="label">今日剩余额度（次）</div>
    <div class="value" id="quota">0</div>
  </div>

  <div class="card">
    <div class="label">当前账号</div>
    <div class="value" id="username">-</div>
  </div>

<script>
  // 读取用户
  const user = localStorage.getItem('fake_user')
  if (!user) location.href = 'index.html'
  document.getElementById('username').innerText = user

  // 生成固定假 key（根据用户名哈希，永远不变）
  function makeKey(s) {
    let hash = 0
    for (let i=0;i<s.length;i++) hash = ((hash<<5)-hash) + s.charCodeAt(i)
    const h = Math.abs(hash).toString(16).padStart(32,'0').slice(0,32)
    return 'sk-'+h
  }
  document.getElementById('user_key').innerText = makeKey(user)

  // 每日额度（每天自动重置）
  const today = new Date().toISOString().split('T')[0]
  const lastDay = localStorage.getItem('last_day')
  if (lastDay !== today) {
    localStorage.setItem('last_day', today)
    localStorage.setItem('quota', 20) // 每天20次
  }

  const q = localStorage.getItem('quota') || 20
  document.getElementById('quota').innerText = q
</script>
</body>
</html>
